server {
    listen 80;
    server_name idid.here www.idid.here;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name idid.here www.idid.here;

    ssl_certificate     /etc/letsencrypt/live/idid.here/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/idid.here/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/idid.here;
    index index.html;

    # Cache vendor chunks lang — hash in bestandsnaam zorgt voor cache-busting
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — alle routes naar index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
