##
## strfry configuratie voor IDidHere
## Filtert alleen IDidHere event kinds + standaard Nostr profile kinds
##

db = "./strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760  # 10 TB
}

relay {
    bind = "127.0.0.1"
    port = 7777
    nofiles = 1000000
    realIpHeader = "X-Real-Ip"

    info {
        name = "IDidHere Relay"
        description = "Dedicated relay voor IDidHere check-in events"
        pubkey = ""
        contact = "relay@idid.here"
    }
}

events {
    maxEventSize = 65536

    # Alleen IDidHere kinds + profiel kinds toestaan
    # 0 = profiel, 3 = contacten, 10002 = NIP-65 relay list
    # 37515-37519 = IDidHere eigen kinds
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000  # 3 jaar
}
